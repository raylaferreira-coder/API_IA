version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-marvel
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
      echo 'Iniciando Ollama server...' &&
      ollama serve &
      sleep 5 &&
      echo 'Baixando modelo LLM...' &&
      ollama pull gemma4 &&
      echo 'Baixando nomic-embed-text...' &&
      ollama pull nomic-embed-text &&
      echo 'Modelos prontos! gemma4 + nomic-embed-text disponiveis' &&
      wait
      "
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - marvel-net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-marvel
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - marvel-net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-marvel
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=chatdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - marvel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./chat-backend
      dockerfile: Dockerfile
    container_name: chat-api-marvel
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=rag
      - RAG_OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma4
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/chatdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - RAG_WEBHOOK_URL=http://n8n:5678/webhook/ingestion-complete
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_started
    restart: unless-stopped
    networks:
      - marvel-net

networks:
  marvel-net:
    driver: bridge

volumes:
  ollama_data:
    driver: local
  n8n_data:
    driver: local
  postgres_data:
    driver: local
