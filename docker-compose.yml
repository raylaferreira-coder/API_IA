services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-marvel
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: post3344
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - marvel-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-marvel
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - marvel-net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-marvel
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - marvel-net

networks:
  marvel-net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  n8n_data:
