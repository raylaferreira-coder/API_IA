services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-marvel
    restart: unless-stopped

    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - marvel-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-marvel
    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    environment:
      OLLAMA_KEEP_ALIVE: "24h"

    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

    networks:
      - marvel-net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-marvel
    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http

    volumes:
      - n8n_data:/home/node/.n8n

    networks:
      - marvel-net

  backend:
    build:
      context: ./chat-backend
      dockerfile: Dockerfile

    container_name: chat-backend
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: rag

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chatdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      RAG_OLLAMA_URL: http://ollama:11434

      OLLAMA_MODEL: gemma3:4b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text

      OLLAMA_CONNECT_TIMEOUT: 30s
      OLLAMA_READ_TIMEOUT: 600s

      N8N_WEBHOOK_URL: http://n8n:5678/webhook/ingestion-complete

      CHUNK_SIZE: 1000
      CHUNK_OVERLAP: 150

      AI_AGENT_ENABLED: "true"
      AI_AGENT_TEMPERATURE: "0.7"
      AI_AGENT_MAX_TOKENS: "4096"

      MARVEL_API_PUBLIC_KEY: ""
      MARVEL_API_PRIVATE_KEY: ""

    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

    networks:
      - marvel-net

networks:
  marvel-net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  n8n_data:
