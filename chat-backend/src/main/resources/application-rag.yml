spring:

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/chatdb}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

rag:

  topK: 1

  chunking:
    size: 800
    overlap: 120

  ollama:

    url: ${RAG_OLLAMA_URL:http://localhost:11434}

    model: ${OLLAMA_MODEL:gemma3:4b}

    embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

    temperature: 0.2

    max-tokens: 2048

    connect-timeout: 30s

    read-timeout: 300s

  webhook:
    enabled: false
    url: ${N8N_WEBHOOK_URL:http://localhost:5678/webhook/ingestion-complete}

ai:

  agent:

    enabled: true

    base-url: ${RAG_OLLAMA_URL:http://localhost:11434}

    model: ${OLLAMA_MODEL:gemma3:4b}

    embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

    temperature: 0.2

    max-tokens: 2048

    connect-timeout: 30000

    read-timeout: 300000

    system-prompt: |
      Você é um assistente especialista no Universo Marvel.

      Utilize exclusivamente as informações recuperadas pelo sistema RAG.

      Nunca utilize conhecimento próprio.

      Nunca invente fatos.

      Nunca complete informações.

      Nunca misture documentos.

      Se a resposta não estiver presente no contexto responda exatamente:

      Não encontrei essa informação na base de conhecimento.