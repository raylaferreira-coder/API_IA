spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/chatdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

ai:
  agent:
    enabled: true
    model: gemma4
    base-url: http://localhost:11434
    temperature: 0.7

rag:
  ollama:
    url: http://localhost:11434
    model: gemma4
    embedding-model: nomic-embed-text
    temperature: 0.7
    max-tokens: 2048
  chunking:
    size: 800
    overlap: 120
  webhook:
    url: http://localhost:5678/webhook/ingestion-complete
    enabled: false
    retry-attempts: 3
    retry-delay: 1000

logging:
  level:
    com.project.chat: DEBUG
