server:
  port: 8080

spring:
  application:
    name: chat-backend
  profiles:
    active: rag
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 11MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC

chat:
  version: 2.0.0
  storage:
    upload-dir: ./uploads
  session:
    expiration-hours: 24

rag:
  topK: 5
  chunking:
    size: 800
    overlap: 120
  ollama:
    url: http://localhost:11434
    model: gemma4
    embedding-model: nomic-embed-text
    connect-timeout: 5s
    read-timeout: 120s
    temperature: 0.7
    max-tokens: 2048
  webhook:
    url: http://localhost:5678/webhook/ingestion-complete
    enabled: false
    retry-attempts: 3
    retry-delay: 1000

ai:
  agent:
    enabled: true
    model: gemma4
    base-url: ${rag.ollama.url}
