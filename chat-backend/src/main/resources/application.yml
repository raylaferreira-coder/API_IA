server:
  port: 8080

spring:
  application:
    name: chat-backend
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 11MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: UTC

chat:
  version: 1.0.0
  storage:
    upload-dir: ./uploads
  session:
    expiration-hours: 24
