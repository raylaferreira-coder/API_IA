services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-marvel
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - marvel-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-marvel
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    entrypoint: >
      sh -c "
      set -e
      echo 'Iniciando Ollama server...' &&
      ollama serve &
      sleep 5 &&
      echo 'Baixando modelo Gemma 3 4B...' &&
      ollama pull gemma3:4b &&
      echo 'Baixando nomic-embed-text...' &&
      ollama pull nomic-embed-text &&
      echo 'Pre-aquecendo modelo LLM...' &&
      ollama run gemma3:4b '' 2>/dev/null || true &&
      echo 'Modelos prontos! gemma3:4b + nomic-embed-text disponiveis' &&
      wait
      "
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list | grep -q gemma3"]
      interval: 30s
      timeout: 30s
      retries: 60
      start_period: 600s
    restart: unless-stopped
    networks:
      - marvel-net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-marvel
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - marvel-net

  backend:
    build: .
    container_name: chat-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: rag
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chatdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RAG_OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: gemma3:4b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_READ_TIMEOUT: 600s
      OLLAMA_CONNECT_TIMEOUT: 30s
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/ingestion-complete
      CHUNK_SIZE: 1000
      CHUNK_OVERLAP: 150
      AI_AGENT_ENABLED: "true"
      AI_AGENT_TEMPERATURE: 0.7
      AI_AGENT_MAX_TOKENS: 4096
      MARVEL_API_PUBLIC_KEY: ""
      MARVEL_API_PRIVATE_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - marvel-net

  frontend:
    build:
      context: ../../Trabalho-Inteligencia-Artificial-GenIA---Front-end-Grupo-5/chat-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: chat-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - marvel-net

networks:
  marvel-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  n8n_data:
    driver: local
