version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-pgvector
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - marvel-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-marvel
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
      echo 'Iniciando Ollama server...' &&
      ollama serve &
      sleep 5 &&
      echo 'Baixando modelo LLM...' &&
      ollama pull llama3.2 &&
      echo 'Baixando nomic-embed-text...' &&
      ollama pull nomic-embed-text &&
      echo 'Modelos prontos! llama3.2 + nomic-embed-text disponiveis' &&
      wait
      "
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - marvel-net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-workflow
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - marvel-net

  app:
    build: .
    container_name: chat-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: rag
      DATABASE_URL: jdbc:postgresql://postgres:5432/chatdb
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/ingestion-complete
      CHUNK_SIZE: 800
      CHUNK_OVERLAP: 120
      AI_AGENT_ENABLED: "true"
      AI_AGENT_TEMPERATURE: 0.7
      AI_AGENT_MAX_TOKENS: 2048
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - marvel-net

networks:
  marvel-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  n8n_data:
    driver: local
