version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-marvel
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
      echo 'Iniciando Ollama server...' &&
      ollama serve &
      sleep 5 &&
      echo 'Baixando Gemma 4...' &&
      ollama pull gemma4 &&
      echo 'Baixando nomic-embed-text...' &&
      ollama pull nomic-embed-text &&
      echo 'Modelos prontos! Gemma 4 + nomic-embed-text disponiveis' &&
      wait
      "
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - marvel-net

networks:
  marvel-net:
    driver: bridge

volumes:
  ollama_data:
    driver: local
